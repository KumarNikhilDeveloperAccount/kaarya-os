<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="magnifyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>

  <g transform="translate(10, 10)">
    <!-- Glass Handle -->
    <line x1="55" y1="55" x2="85" y2="85" stroke="url(#magnifyGradient)" stroke-width="16" stroke-linecap="round" />
    
    <!-- Glass Circle -->
    <circle cx="35" cy="35" r="30" fill="none" stroke="url(#magnifyGradient)" stroke-width="12" />
    
    <!-- Inner Person -->
    <circle cx="35" cy="25" r="10" fill="#a78bfa" />
    <path d="M 15 50 Q 35 30 55 50 Z" fill="#a78bfa" />
  </g>
</svg>
