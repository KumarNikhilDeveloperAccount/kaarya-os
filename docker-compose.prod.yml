version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: kaarya_db_prod
    restart: always
    environment:
      POSTGRES_USER: kaarya_user
      POSTGRES_PASSWORD: kaarya_password
      POSTGRES_DB: kaarya_os
    ports:
      - "5433:5432"
    volumes:
      - pg_data_prod:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kaarya_redis_prod
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: kaarya_backend_prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://kaarya_user:kaarya_password@db:5432/kaarya_os
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock  # Enable Sandbox execution
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: kaarya_frontend_prod
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data_prod:
