<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="100%" height="100%">
  <!-- Defs for Gradients -->
  <defs>
    <linearGradient id="magnifyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c4b5fd" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
  </defs>

  <!-- Magnifying Glass / Person Icon -->
  <g transform="translate(20, 20)">
    <!-- Glass Handle -->
    <line x1="55" y1="55" x2="80" y2="80" stroke="url(#magnifyGradient)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Glass Circle -->
    <circle cx="35" cy="35" r="30" fill="none" stroke="url(#magnifyGradient)" stroke-width="8" />
    
    <!-- Inner Person -->
    <!-- Head -->
    <circle cx="35" cy="25" r="10" fill="#a78bfa" />
    <!-- Shoulders -->
    <path d="M 15 50 Q 35 30 55 50 Z" fill="#a78bfa" />
  </g>

  <!-- Text Kaarya.os -->
  <text x="120" y="65" font-family="'Inter', sans-serif" font-weight="900" font-size="42" fill="url(#textGradient)">Kaarya.os</text>
  
  <!-- Subtitle -->
  <text x="125" y="85" font-family="'Inter', sans-serif" font-weight="600" font-size="12" fill="#64748b" letter-spacing="2">SEARCHING THE GENIUS..</text>
</svg>
