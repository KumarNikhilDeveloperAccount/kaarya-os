services:
  - type: web
    name: kaarya-os-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./kaarya_os.db
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: EMAIL_MODE
        value: smtp
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: kaarya.support@gmail.com
      - key: SMTP_PASSWORD
        value: ALksdjhfvgmz#@202
      - key: FRONTEND_BASE_URL
        value: https://frontend-two-steel-22.vercel.app
